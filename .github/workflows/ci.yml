name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minio \
            -e MINIO_ROOT_PASSWORD=miniominio \
            minio/minio server /data
          # Wait up to 30 s for MinIO to become ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done

      - name: go test
        env:
          FUSEY_TEST_ENDPOINT: http://localhost:9000
          FUSEY_ACCESS_KEY: minio
          FUSEY_SECRET_KEY: miniominio
        run: go test -race -count=1 -timeout 120s ./...
